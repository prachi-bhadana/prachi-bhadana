# ============================================================
# GitHub Actions workflow to generate the contribution snake SVG
# referenced in README.md.
#
# WHERE TO PUT THIS FILE:
#   In your prachi-bhadana/prachi-bhadana repo, at:
#   .github/workflows/snake.yml
#
# REQUIRED REPO SETTINGS:
#   Settings → Actions → General → Workflow permissions
#   → set to "Read and write permissions", then Save.
#   (Needed so the action can push to the "output" branch.)
#
# HOW IT'S USED IN THE README:
#   <img src="https://raw.githubusercontent.com/prachi-bhadana/prachi-bhadana/output/github-contribution-grid-snake-dark.svg" />
#   This URL only works AFTER this workflow has run at least once
#   (it creates the "output" branch with the generated SVG).
# ============================================================

name: generate-snake

on:
  schedule:
    - cron: "0 0 * * *"   # runs once a day
  workflow_dispatch: {}    # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main               # regenerate whenever you push to main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: prachi-bhadana
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push generated files to the "output" branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
